# Configuración para tests
spring.application.name=cherry-skincare-test

# Base de datos H2 en memoria para tests unitarios
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate para tests
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=false

# JWT Configuration para tests
jwt.secret=testSecretKeyForJWTTokenGenerationInTestsOnly12345678901234567890
jwt.expiration=86400000

# CORS Configuration para tests
cors.allowed-origins=http://localhost:3000,http://localhost:5173

# File Storage para tests
file.upload-dir=test-uploads

# Logging para tests
logging.level.com.cherryskincare=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN
