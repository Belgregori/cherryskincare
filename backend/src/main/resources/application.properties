spring.application.name=cherry-skincare

# ============================================
# CONFIGURACIÓN BASE (común a todos los perfiles)
# ============================================
# Este archivo contiene configuraciones por defecto
# Los perfiles específicos (dev, prod, test) sobrescriben estas configuraciones
# 
# Para activar un perfil:
# - Desarrollo: spring.profiles.active=dev
# - Producción: spring.profiles.active=prod
# - Tests: spring.profiles.active=test (automático en tests)
#
# O usar variable de entorno: SPRING_PROFILES_ACTIVE=dev
# ============================================

# Perfil activo por defecto (puede sobrescribirse con variable de entorno)
# Si no se especifica, se usan los valores por defecto de este archivo
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Base de datos MySQL - Usar variables de entorno
# ⚠️ IMPORTANTE: Para producción, configura DB_PASSWORD como variable de entorno
# ⚠️ Este valor por defecto es solo para desarrollo local
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/cherry_skincare?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:romipass1}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=${FORMAT_SQL:false}

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Server
server.port=${SERVER_PORT:0}
# Compresión GZIP para mejorar rendimiento
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,application/javascript,text/css
server.compression.min-response-size=1024

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

# File Storage
file.upload-dir=${UPLOAD_DIR:uploads/images}
# Tipo de almacenamiento: 'local' o 's3' (para producción, usar 's3')
storage.type=${STORAGE_TYPE:local}

# Virus Scan Configuration
# Habilitar escaneo antivirus (requiere implementación del servicio)
virus.scan.enabled=${VIRUS_SCAN_ENABLED:false}
# Rechazar archivos si el escaneo falla (recomendado: true en producción)
virus.scan.reject-on-error=${VIRUS_SCAN_REJECT_ON_ERROR:true}

# JWT Configuration - Usar variables de entorno
# ⚠️ IMPORTANTE: Para producción, configura JWT_SECRET como variable de entorno
# ⚠️ Este valor por defecto es solo para desarrollo local
jwt.secret=${JWT_SECRET:cherrySkincareSecretKey2024SuperSecureKeyForJWTTokenGeneration}
jwt.expiration=${JWT_EXPIRATION:86400000}
# Refresh token expiration (7 días en milisegundos)
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# CORS Configuration
# Lista de orígenes permitidos separados por comas
# Ejemplo: http://localhost:5173,http://localhost:3000,https://tudominio.com
cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

# Admin User Configuration
# ⚠️ IMPORTANTE: Para producción, configura estas variables de entorno
# ⚠️ NO uses valores por defecto en producción
admin.email=${ADMIN_EMAIL:}
admin.password=${ADMIN_PASSWORD:}
# Habilitar creación de admin al iniciar (solo para desarrollo)
admin.create-on-startup=${ADMIN_CREATE_ON_STARTUP:false}

# Logging
logging.level.com.cherryskincare=INFO
logging.level.org.springframework.security=WARN
# SQL logging: DEBUG shows SQL queries, OFF hides them
# Use SHOW_SQL environment variable to control via spring.jpa.show-sql instead
logging.level.org.hibernate.SQL=OFF
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Auth security
auth.max-attempts=${AUTH_MAX_ATTEMPTS:5}
auth.lockout-minutes=${AUTH_LOCKOUT_MINUTES:15}
auth.rate-limit-per-minute=${AUTH_RATE_LIMIT_PER_MINUTE:30}

# SpringDoc OpenAPI (Swagger)
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true

# Spring Boot Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.health.db.enabled=true
management.health.diskspace.enabled=true
management.metrics.export.simple.enabled=true

# Password Reset Configuration
password.reset.expiration=${PASSWORD_RESET_EXPIRATION:3600000}
app.base-url=${APP_BASE_URL:http://localhost:3000}

# Email Configuration (para recuperación de contraseña)
spring.mail.enabled=${MAIL_ENABLED:false}
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
