spring.application.name=cherry-skincare

# Base de datos MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/cherry_skincare?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=romipass1
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Server
server.port=8080

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# File Storage
file.upload-dir=uploads/images

# JWT Configuration
jwt.secret=cherrySkincareSecretKey2024SuperSecureKeyForJWTTokenGeneration
jwt.expiration=86400000
