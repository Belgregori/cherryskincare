# ============================================
# PERFIL DE DESARROLLO
# ============================================
# Este archivo contiene configuraciones específicas para desarrollo local
# Copia este archivo desde application-dev.properties.example y completa los valores

# Base de datos MySQL (desarrollo local)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/cherry_skincare?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:romipass1}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate (desarrollo - más permisivo)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=${FORMAT_SQL:false}

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Server (desarrollo - puerto fijo para desarrollo)
server.port=${SERVER_PORT:8080}

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

# File Storage
file.upload-dir=${UPLOAD_DIR:uploads/images}

# JWT Configuration (desarrollo)
# ⚠️ IMPORTANTE: En producción, usa una clave secreta fuerte generada aleatoriamente
jwt.secret=${JWT_SECRET:cherrySkincareSecretKey2024SuperSecureKeyForJWTTokenGeneration}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# CORS Configuration (desarrollo - más permisivo)
cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000,http://localhost:5174}

# Admin User Configuration (desarrollo)
# Solo para desarrollo local
admin.email=${ADMIN_EMAIL:admin@localhost}
admin.password=${ADMIN_PASSWORD:admin123}
admin.create-on-startup=${ADMIN_CREATE_ON_STARTUP:true}

# Logging (desarrollo: app en DEBUG; sin SQL ni traza de Security en consola)
logging.level.com.cherryskincare=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=OFF
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# SpringDoc OpenAPI (Swagger) - Habilitado en desarrollo
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true

# Spring Boot Actuator (desarrollo)
management.endpoints.web.exposure.include=health,info,metrics,env
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true

# Email Configuration (desarrollo - opcional)
spring.mail.enabled=${MAIL_ENABLED:false}
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Password Reset
password.reset.expiration=${PASSWORD_RESET_EXPIRATION:3600000}
app.base-url=${APP_BASE_URL:http://localhost:3000}

# Auth security (desarrollo - más permisivo)
auth.max-attempts=${AUTH_MAX_ATTEMPTS:10}
auth.lockout-minutes=${AUTH_LOCKOUT_MINUTES:5}
auth.rate-limit-per-minute=${AUTH_RATE_LIMIT_PER_MINUTE:100}
