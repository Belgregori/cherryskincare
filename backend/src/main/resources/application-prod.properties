# ============================================
# PERFIL DE PRODUCCIÓN
# ============================================
# ⚠️ IMPORTANTE: Este archivo NO debe contener valores reales
# Usa SOLO variables de entorno para valores sensibles
# NUNCA commitees este archivo con contraseñas o secrets

# Base de datos MySQL (producción)
# ⚠️ TODAS las credenciales deben venir de variables de entorno
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# Aiven / MySQL en la nube: TLS (ajustá si tu DB_URL ya trae sslMode completo)
spring.datasource.hikari.data-source-properties.sslMode=${MYSQL_SSL_MODE:REQUIRED}
# Pool de conexiones optimizado para producción
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA/Hibernate (producción - estricto)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.type.preferred_enum_jdbc_type=12
# Optimizaciones para producción
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=false
spring.flyway.validate-on-migrate=true

# Server (producción) — Render inyecta PORT; si no, SERVER_PORT o 8080
server.port=${PORT:${SERVER_PORT:8080}}
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false
# Compresión GZIP (producción - mejor rendimiento)
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,application/javascript,text/css
server.compression.min-response-size=1024

# File Upload (producción)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

# File Storage (producción)
file.upload-dir=${FILE_UPLOAD_DIR:/var/uploads/images}
# Tipo de almacenamiento: 'local' o 's3' (recomendado: 's3' para producción)
storage.type=${STORAGE_TYPE:s3}

# Virus Scan Configuration (producción)
# ⚠️ IMPORTANTE: Habilitar escaneo antivirus en producción
# Requiere implementar un servicio de escaneo real (ClamAV, VirusTotal, etc.)
virus.scan.enabled=${VIRUS_SCAN_ENABLED:true}
virus.scan.reject-on-error=${VIRUS_SCAN_REJECT_ON_ERROR:true}

# AWS S3 Configuration (si storage.type=s3)
# ⚠️ Configurar mediante variables de entorno
#aws.s3.bucket-name=${AWS_S3_BUCKET_NAME}
#aws.s3.region=${AWS_S3_REGION:us-east-1}
#aws.s3.access-key=${AWS_ACCESS_KEY_ID}
#aws.s3.secret-key=${AWS_SECRET_ACCESS_KEY}

# JWT Configuration (producción)
# ⚠️ DEBE ser una clave secreta fuerte generada aleatoriamente (mínimo 256 bits)
# Genera con: openssl rand -base64 32
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# CORS Configuration (producción - restrictivo)
# ⚠️ En Render: Environment → agregar CORS_ORIGINS con la URL pública del frontend (ej. Vercel).
#    Ejemplo: CORS_ORIGINS=https://tu-app.vercel.app
#    Varios orígenes: separados por coma, sin espacios.
cors.allowed-origins=${CORS_ORIGINS}

# Admin User Configuration (producción)
# ⚠️ Configurar mediante variables de entorno
admin.email=${ADMIN_EMAIL}
admin.password=${ADMIN_PASSWORD}
# En producción, NUNCA crear admin automáticamente
admin.create-on-startup=false

# Logging (producción)
logging.level.com.cherryskincare=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN
logging.level.org.springframework.web=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
# Logging a archivo en producción
logging.file.name=${LOG_FILE_PATH:/var/log/cherry-skincare/application.log}
logging.file.max-size=10MB
logging.file.max-history=30

# SpringDoc OpenAPI (Swagger) - Deshabilitado en producción por defecto
# Si necesitas habilitarlo, configura springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Spring Boot Actuator (producción - restrictivo)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.endpoint.health.db.enabled=true
management.endpoint.health.diskspace.enabled=true
# Solo admins pueden acceder a métricas
management.endpoints.web.base-path=/actuator

# Email Configuration (producción)
spring.mail.enabled=${MAIL_ENABLED:true}
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Password Reset
password.reset.expiration=${PASSWORD_RESET_EXPIRATION:3600000}
app.base-url=${APP_BASE_URL}

# Auth security (producción - estricto)
auth.max-attempts=${AUTH_MAX_ATTEMPTS:5}
auth.lockout-minutes=${AUTH_LOCKOUT_MINUTES:15}
auth.rate-limit-per-minute=${AUTH_RATE_LIMIT_PER_MINUTE:30}
